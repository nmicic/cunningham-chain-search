<body>
    <div class="app">

    <script>
        let grid = [], positionMap = new Map(), reverseMap = new Map();
        let selectedNumber = null, numRows = 12, visibleCols = 40, colOffset = 0, totalCols = 0;
        let ccCache = { chains1: [], chains2: [], membership: new Map(), sophieGermains: new Set(), safePrimes: new Set() };
        let currentCCIndex = -1, allCCStarts = [], selectedCCChain = null;
        
        const primeCache = new Map();
        function isPrime(n) {
            if (n < 2) return false;
            if (primeCache.has(n)) return primeCache.get(n);
            if (n === 2 || n === 3) { primeCache.set(n, true); return true; }
            if (n % 2 === 0) { primeCache.set(n, false); return false; }
            for (let i = 3; i * i <= n; i += 2) {
                if (n % i === 0) { primeCache.set(n, false); return false; }
            }
            primeCache.set(n, true);
            return true;
        }
        
        function factorize(n) {
            if (n < 2) return [];
            const factors = [];
            let temp = n;
            for (let i = 2; i * i <= temp; i++) {
                while (temp % i === 0) { factors.push(i); temp /= i; }
            }
            if (temp > 1) factors.push(temp);
            return factors;
        }

        function isMersenne(n) { const m = n + 1; return m > 0 && (m & (m - 1)) === 0 && isPrime(n); }
        function isFermat(n) { return [3, 5, 17, 257, 65537].includes(n); }
        function isPowerOf2(n) { return n > 0 && (n & (n - 1)) === 0; }
        
        function getCunninghamChain1(start) {
            if (!isPrime(start)) return null;
            const chain = [start];
            let current = start;
            while (true) {
                const next = 2 * current + 1;
                if (!isPrime(next) || next > 10000000) break;
                chain.push(next);
                current = next;
            }
            const prev = (start - 1) / 2;
            if (prev > 1 && Number.isInteger(prev) && isPrime(prev)) return null;
            return chain.length >= 2 ? chain : null;
        }
        
        function getCunninghamChain2(start) {
            if (!isPrime(start)) return null;
            const chain = [start];
            let current = start;
            while (true) {
                const next = 2 * current - 1;
                if (next < 2 || !isPrime(next) || next > 10000000) break;
                chain.push(next);
                current = next;
            }
            const prev = (start + 1) / 2;
            if (prev > 1 && Number.isInteger(prev) && isPrime(prev)) return null;
            return chain.length >= 2 ? chain : null;
        }
        
        function isSophieGermain(n) { return isPrime(n) && isPrime(2 * n + 1); }
        function isSafePrime(n) { if (!isPrime(n)) return false; const sg = (n - 1) / 2; return Number.isInteger(sg) && isPrime(sg); }
        
        function buildCCCache() {
            ccCache = { chains1: [], chains2: [], membership: new Map(), sophieGermains: new Set(), safePrimes: new Set() };
            const maxN = 1 << numRows;
            for (let n = 2; n < maxN; n++) {
                if (!isPrime(n)) continue;
                if (isSophieGermain(n)) ccCache.sophieGermains.add(n);
                if (isSafePrime(n)) ccCache.safePrimes.add(n);
                const chain1 = getCunninghamChain1(n);
                if (chain1) {
                    ccCache.chains1.push({ start: n, chain: chain1 });
                    chain1.forEach((p, idx) => {
                        if (!ccCache.membership.has(p)) ccCache.membership.set(p, []);
                        ccCache.membership.get(p).push({ type: 1, chain: chain1, position: idx, isStart: idx === 0 });
                    });
                }
                const chain2 = getCunninghamChain2(n);
                if (chain2) {
                    ccCache.chains2.push({ start: n, chain: chain2 });
                    chain2.forEach((p, idx) => {
                        if (!ccCache.membership.has(p)) ccCache.membership.set(p, []);
                        ccCache.membership.get(p).push({ type: 2, chain: chain2, position: idx, isStart: idx === 0 });
                    });
                }
            }
            allCCStarts = [];
            ccCache.chains1.forEach(c => allCCStarts.push({ start: c.start, type: 1, chain: c.chain }));
            ccCache.chains2.forEach(c => allCCStarts.push({ start: c.start, type: 2, chain: c.chain }));
            allCCStarts.sort((a, b) => a.start - b.start);
        }

        function drawCCLines(gridDiv, cellSize) {
            const cellW = cellSize;
            const cellH = Math.round(cellSize * 0.7);
            const svgW = visibleCols * cellW;
            const svgH = numRows * cellH;
            const inset = Math.max(2, Math.round(cellW / 8));
            const dotR = Math.max(1.5, Math.min(3, cellW / 12));
            const lw = Math.max(1, Math.min(2.5, cellW / 16));

            const ns = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(ns, 'svg');
            svg.setAttribute('class', 'cc-lines-svg');
            svg.setAttribute('width', svgW);
            svg.setAttribute('height', svgH);
            svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);

            // Helper: get corner position for a cell in visible coords
            function cornerPos(row, col, kind) {
                const visCol = col - colOffset;
                if (visCol < 0 || visCol >= visibleCols) return null;
                if (kind === 1) {
                    // CC1: right-top corner
                    return { x: visCol * cellW + cellW - inset, y: row * cellH + inset };
                } else {
                    // CC2: left-top corner
                    return { x: visCol * cellW + inset, y: row * cellH + inset };
                }
            }

            // Collect all chains
            const allChains = [
                ...ccCache.chains1.map(c => ({ type: 1, chain: c.chain })),
                ...ccCache.chains2.map(c => ({ type: 2, chain: c.chain }))
            ];

            for (const { type, chain } of allChains) {
                if (chain.length < 2) continue;
                const lineCol = type === 1 ? '#ef4444' : '#3b82f6';
                const dotCol = type === 1 ? '#fca5a5' : '#93c5fd';

                // Find positions of chain members in the grid
                const pts = [];
                for (const n of chain) {
                    const pos = positionMap.get(n);
                    if (pos) {
                        const corner = cornerPos(pos.row, pos.col, type);
                        if (corner) pts.push({ ...corner, n, row: pos.row, col: pos.col });
                        else pts.push(null);
                    } else {
                        pts.push(null);
                    }
                }

                // Draw line segments
                for (let i = 0; i < pts.length - 1; i++) {
                    const a = pts[i], b = pts[i + 1];
                    if (!a || !b) continue;
                    const line = document.createElementNS(ns, 'line');
                    line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
                    line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
                    line.setAttribute('stroke', lineCol);
                    line.setAttribute('stroke-width', lw);
                    line.setAttribute('stroke-opacity', '0.8');
                    line.setAttribute('stroke-linecap', 'round');
                    svg.appendChild(line);
                }

                // Draw dots
                for (const pt of pts) {
                    if (!pt) continue;
                    const circ = document.createElementNS(ns, 'circle');
                    circ.setAttribute('cx', pt.x); circ.setAttribute('cy', pt.y);
                    circ.setAttribute('r', dotR);
                    circ.setAttribute('fill', dotCol);
                    circ.setAttribute('stroke', lineCol);
                    circ.setAttribute('stroke-width', Math.max(0.5, lw * 0.4));
                    circ.setAttribute('opacity', '0.9');
                    svg.appendChild(circ);
                }

                // Badge at chain start if visible
                if (pts[0]) {
                    const p = pts[0];
                    const badge = `CC${type}\u00b7${chain.length}`;
                    const fsize = Math.max(6, Math.min(10, cellW / 4));
                    const tw = badge.length * fsize * 0.55;
                    const bpad = 2;
                    const bx = p.col === colOffset ? p.x : p.x - tw / 2;
                    const by = p.y - dotR - fsize - bpad * 2;

                    const rect = document.createElementNS(ns, 'rect');
                    rect.setAttribute('x', bx - bpad);
                    rect.setAttribute('y', by);
                    rect.setAttribute('width', tw + bpad * 2);
                    rect.setAttribute('height', fsize + bpad * 2);
                    rect.setAttribute('fill', lineCol);
                    rect.setAttribute('rx', '2');
                    rect.setAttribute('opacity', '0.85');
                    svg.appendChild(rect);

                    const text = document.createElementNS(ns, 'text');
                    text.setAttribute('x', bx + tw / 2);
                    text.setAttribute('y', by + fsize / 2 + bpad);
                    text.setAttribute('font-size', fsize);
                    text.setAttribute('fill', '#fff');
                    text.setAttribute('font-weight', '700');
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('dominant-baseline', 'middle');
                    text.setAttribute('font-family', 'monospace');
                    text.textContent = badge;
                    svg.appendChild(text);
                }
            }

            gridDiv.appendChild(svg);
        }

        function getNumberClass(n) {
            if (n === 1) return 'one';
            if (isPowerOf2(n)) return 'power2';
            if (isFermat(n)) return 'fermat';
            if (isMersenne(n)) return 'mersenne';
            const showCC = document.getElementById('showCC').checked;
            if (showCC) {
                const ccInfo = ccCache.membership.get(n);
                if (ccInfo && ccInfo.length > 0) {
                    const cc1 = ccInfo.find(c => c.type === 1);
                    const cc2 = ccInfo.find(c => c.type === 2);
                    if (cc1 && cc1.isStart) return 'cc1-start';
                    if (cc2 && cc2.isStart) return 'cc2-start';
                    if (cc1) return 'cc1-member';
                    if (cc2) return 'cc2-member';
                }
                if (ccCache.safePrimes.has(n)) return 'safe-prime';
            }
            if (isPrime(n)) return 'prime';
            return 'composite';
        }

        function toBinary(n) { return n.toString(2); }
        function trailingZeros(n) { if (n === 0) return 0; let c = 0; while ((n & 1) === 0) { c++; n >>= 1; } return c; }
        function trailingOnes(n) { return trailingZeros(n + 1); }

        function buildGrid() {
            totalCols = 1 << (numRows - 1);
            grid = [];
            positionMap.clear();
            reverseMap.clear();
            for (let row = 0; row < numRows; row++) grid.push(new Array(totalCols).fill(null));
            const bottomRow = numRows - 1;
            const bottomStart = 1 << (numRows - 1);
            for (let col = 0; col < totalCols; col++) {
                const n = bottomStart + col;
                grid[bottomRow][col] = n;
                positionMap.set(n, {row: bottomRow, col});
                reverseMap.set(`${bottomRow},${col}`, n);
            }
            for (let row = bottomRow; row > 0; row--) {
                for (let col = 0; col < totalCols; col++) {
                    const n = grid[row][col];
                    if (n !== null && n % 2 === 0) {
                        const parent = n / 2;
                        grid[row - 1][col] = parent;
                        positionMap.set(parent, {row: row - 1, col});
                        reverseMap.set(`${row - 1},${col}`, parent);
                    }
                }
            }
            document.getElementById('colOffset').max = Math.max(0, totalCols - visibleCols);
            buildCCCache();
        }

        function findColumnForNumber(target) {
            let n = target;
            while (n % 2 === 0) n /= 2;
            const pos = positionMap.get(target);
            if (pos) return pos.col;
            const minBottom = 1 << (numRows - 1);
            const maxBottom = (1 << numRows) - 1;
            for (let k = 0; k < numRows; k++) {
                const candidate = (1 << k) * n;
                if (candidate >= minBottom && candidate <= maxBottom) return candidate - minBottom;
            }
            return 0;
        }

        function jumpLeft() { colOffset = Math.max(0, colOffset - Math.floor(visibleCols / 2)); document.getElementById('colOffset').value = colOffset; render(); }
        function jumpRight() { colOffset = Math.min(totalCols - visibleCols, colOffset + Math.floor(visibleCols / 2)); colOffset = Math.max(0, colOffset); document.getElementById('colOffset').value = colOffset; render(); }
        function stepLeft() { colOffset = Math.max(0, colOffset - 5); document.getElementById('colOffset').value = colOffset; render(); }
        function stepRight() { colOffset = Math.min(totalCols - visibleCols, colOffset + 5); colOffset = Math.max(0, colOffset); document.getElementById('colOffset').value = colOffset; render(); }
        
        function centerOnNumber() {
            const target = parseInt(document.getElementById('centerNumber').value) || 1;
            const col = findColumnForNumber(target);
            colOffset = Math.max(0, Math.min(totalCols - visibleCols, col - Math.floor(visibleCols / 2)));
            document.getElementById('colOffset').value = colOffset;
            render();
            const pos = positionMap.get(target);
            if (pos) selectNumber(target, pos.row, pos.col);
        }
        
        function findNearestCCIndex() {
            const centerCol = colOffset + Math.floor(visibleCols / 2);
            let bestIdx = 0, bestDist = Infinity;
            for (let i = 0; i < allCCStarts.length; i++) {
                const dist = Math.abs(findColumnForNumber(allCCStarts[i].start) - centerCol);
                if (dist < bestDist) { bestDist = dist; bestIdx = i; }
            }
            return bestIdx;
        }
        
        function prevCC() {
            if (allCCStarts.length === 0) return;
            if (currentCCIndex < 0) currentCCIndex = findNearestCCIndex();
            currentCCIndex = (currentCCIndex - 1 + allCCStarts.length) % allCCStarts.length;
            const cc = allCCStarts[currentCCIndex];
            selectedCCChain = cc.chain;
            document.getElementById('centerNumber').value = cc.start;
            centerOnNumber();
        }
        
        function nextCC() {
            if (allCCStarts.length === 0) return;
            if (currentCCIndex < 0) currentCCIndex = findNearestCCIndex();
            currentCCIndex = (currentCCIndex + 1) % allCCStarts.length;
            const cc = allCCStarts[currentCCIndex];
            selectedCCChain = cc.chain;
            document.getElementById('centerNumber').value = cc.start;
            centerOnNumber();
        }
        
        function goToCC(idx) {
            currentCCIndex = idx;
            const cc = allCCStarts[idx];
            selectedCCChain = cc.chain;
            document.getElementById('centerNumber').value = cc.start;
            centerOnNumber();
        }
        
        // Binary Prefix Analysis (now a helper, UI removed)
        function analyzePrefix() {
            // No-op since we removed the prefix explorer UI
        }
        
        function updateModConstraints(prefixStr) {
            // No-op since we removed the mod constraints UI
        }
        
        function findLongestChains() {
            const results = [];
            
            for (let prefix = 2; prefix < 128; prefix++) {
                const prefixStr = prefix.toString(2);
                let chainLen = 0;
                const chain = [];
                
                for (let ones = 1; ones <= 25; ones++) {
                    const n = (prefix << ones) | ((1 << ones) - 1);
                    if (n > 50000000) break;
                    if (isPrime(n)) {
                        if (chainLen === ones - 1) { chainLen = ones; chain.push(n); }
                    } else break;
                }
                
                if (chainLen >= 3) results.push({ prefix, prefixStr, chainLen, chain });
            }
            
            results.sort((a, b) => b.chainLen - a.chainLen);
            
            const longChainsEl = document.getElementById('longChains');
            if (longChainsEl) {
                longChainsEl.innerHTML = results.slice(0, 6).map(r => `
                    <div class="chain-card" onclick="selectPrefixChain('${r.prefixStr}')">
                        <div class="chain-header">
                            <span class="chain-len">CC${r.chainLen}</span>
                            <span class="chain-prefix">${r.prefixStr}...</span>
                        </div>
                        <div class="chain-nums">${r.chain.slice(0, 4).join('→')}${r.chain.length > 4 ? '...' : ''}</div>
                    </div>
                `).join('');
            }
        }
        
        function selectPrefixChain(prefixStr) {
            // Build the chain and center on first member
            let chainLen = 0;
            const chain = [];
            const prefix = parseInt(prefixStr, 2);
            
            for (let ones = 1; ones <= 25; ones++) {
                const n = (prefix << ones) | ((1 << ones) - 1);
                if (n > 50000000) break;
                if (isPrime(n)) {
                    if (chainLen === ones - 1) { chainLen = ones; chain.push(n); }
                } else break;
            }
            
            selectedCCChain = chain;
            if (chain.length > 0) {
                document.getElementById('centerNumber').value = chain[0];
                centerOnNumber();
            }
        }

        function render() {
            numRows = parseInt(document.getElementById('numRows').value) || 12;
            visibleCols = parseInt(document.getElementById('visibleCols').value) || 40;
            colOffset = parseInt(document.getElementById('colOffset').value) || 0;
            const cellSize = parseInt(document.getElementById('cellSize').value) || 50;
            const showMod = document.getElementById('showMod').checked;
            const showCCPath = document.getElementById('showCCPath').checked;

            buildGrid();
            colOffset = Math.min(colOffset, Math.max(0, totalCols - visibleCols));
            document.getElementById('colOffset').value = colOffset;

            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            const gridDiv = document.createElement('div');
            gridDiv.className = 'grid';

            let ccPathPositions = new Set();
            if (showCCPath && selectedCCChain) {
                for (const n of selectedCCChain) {
                    const pos = positionMap.get(n);
                    if (pos) ccPathPositions.add(`${pos.row},${pos.col}`);
                }
            }

            for (let row = 0; row < numRows; row++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';

                for (let visCol = 0; visCol < visibleCols; visCol++) {
                    const col = colOffset + visCol;
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.width = cellSize + 'px';
                    cell.style.height = Math.round(cellSize * 0.7) + 'px';
                    cell.style.fontSize = Math.max(8, Math.round(cellSize / 5)) + 'px';

                    const n = grid[row]?.[col];
                    if (n === null || n === undefined) {
                        cell.classList.add('empty');
                    } else {
                        cell.classList.add(getNumberClass(n));
                        cell.textContent = n;
                        cell.onclick = () => selectNumber(n, row, col);

                        if (showMod) {
                            let mods = [];
                            if (n % 3 === 0) { cell.classList.add('highlight-mod3'); mods.push('<span class="mod-3">3</span>'); }
                            if (n % 5 === 0) { cell.classList.add('highlight-mod5'); mods.push('<span class="mod-5">5</span>'); }
                            if (n % 7 === 0) { cell.classList.add('highlight-mod7'); mods.push('<span class="mod-7">7</span>'); }
                            if (n % 11 === 0) { cell.classList.add('highlight-mod11'); mods.push('<span class="mod-11">11</span>'); }
                            if (n % 13 === 0) { cell.classList.add('highlight-mod13'); mods.push('<span class="mod-13">13</span>'); }
                            if (mods.length > 0) {
                                const ind = document.createElement('div');
                                ind.className = 'mod-indicator';
                                ind.innerHTML = mods.join('');
                                cell.appendChild(ind);
                            }
                        }

                        if (ccPathPositions.has(`${row},${col}`)) cell.classList.add('cc-path');
                        if (n === selectedNumber) cell.classList.add('selected');
                    }
                    rowDiv.appendChild(cell);
                }
                gridDiv.appendChild(rowDiv);
            }

            container.appendChild(gridDiv);
            
            // Draw CC connection lines as SVG overlay
            if (document.getElementById('showCCLines').checked) {
                drawCCLines(gridDiv, cellSize);
            }
            
            const hint = document.createElement('div');
            hint.className = 'position-info';
            hint.innerHTML = `Cols ${colOffset}-${colOffset + visibleCols - 1} of ${totalCols} | Row ${numRows}: ${1 << (numRows-1)} to ${(1 << numRows) - 1}`;
            container.appendChild(hint);
            
            updateCCPanel();
        }
        
        function updateCCPanel() {
            const visibleCCs = [];
            for (let i = 0; i < allCCStarts.length; i++) {
                const col = findColumnForNumber(allCCStarts[i].start);
                if (col >= colOffset && col < colOffset + visibleCols) visibleCCs.push({ ...allCCStarts[i], index: i });
            }
            
            document.getElementById('ccStats').innerHTML = `
                <div class="cc-stats-row"><span>CC1 chains:</span><span>${ccCache.chains1.length}</span></div>
                <div class="cc-stats-row"><span>CC2 chains:</span><span>${ccCache.chains2.length}</span></div>
                <div class="cc-stats-row"><span>In view:</span><span>${visibleCCs.length}</span></div>
            `;
            
            document.getElementById('ccList').innerHTML = visibleCCs.slice(0, 10).map(cc => `
                <div class="cc-list-item cc-type-${cc.type} ${currentCCIndex === cc.index ? 'active' : ''}" onclick="goToCC(${cc.index})">
                    CC${cc.type}: ${cc.chain.join('→')}
                </div>
            `).join('') || '<div style="color:#6b7280;padding:8px;">None in view</div>';
        }

        function selectNumber(n, row, col) {
            selectedNumber = n;
            document.getElementById('noSelection').style.display = 'none';
            document.getElementById('analysisGrid').style.display = 'grid';
            
            // Get CC info
            const ccInfo = ccCache.membership.get(n);
            if (ccInfo && ccInfo.length > 0) {
                selectedCCChain = ccInfo[0].chain;
            }
            
            // Analyze the number
            const analysis = analyzeNumber(n);
            
            // Build analysis HTML
            let html = '';
            
            // Panel 1: Overview
            html += `<div class="analysis-panel">
                <h3>📊 Overview</h3>
                <div style="display:flex;gap:8px;margin-bottom:8px;">
                    ${analysis.cc1Len > 0 ? `<span class="result-badge cc1">CC${analysis.cc1Len} 1st</span>` : ''}
                    ${analysis.cc2Len > 0 ? `<span class="result-badge cc2">CC${analysis.cc2Len} 2nd</span>` : ''}
                    ${analysis.cc1Len >= 2 && analysis.cc1Len === analysis.cc2Len ? `<span class="result-badge bitwin">BI-TWIN</span>` : ''}
                </div>
                <div class="copybox" onclick="navigator.clipboard.writeText('${n}')" title="Click to copy">
                    <span style="color:#6b7280;">dec:</span> ${n}
                </div>
                <div class="copybox" onclick="navigator.clipboard.writeText('0x${n.toString(16).toUpperCase()}')" title="Click to copy">
                    <span style="color:#6b7280;">hex:</span> 0x${n.toString(16).toUpperCase()}
                </div>
                <div class="copybox" onclick="navigator.clipboard.writeText('${n.toString(2)}')" title="Click to copy">
                    <span style="color:#6b7280;">bin:</span> ${n.toString(2)}
                </div>
                <div class="prop"><span class="prop-k">Status</span><span class="prop-v" style="color:${analysis.isPrime?'#22c55e':'#ef4444'}">${analysis.isPrime?'PRIME':'COMPOSITE'}</span></div>
                <div class="prop"><span class="prop-k">Bits</span><span class="prop-v">${analysis.bits}</span></div>
                <div class="prop"><span class="prop-k">Grid Position</span><span class="prop-v">Row ${row + 1}, Col ${col}</span></div>
                ${!analysis.isPrime ? `<div class="factor-box">${analysis.factorStr}</div>` : ''}
            </div>`;
            
            // Panel 2: 2-adic Properties
            html += `<div class="analysis-panel">
                <h3>📐 2-Adic Properties</h3>
                <div class="prop"><span class="prop-k">ν₂(n−1)</span><span class="prop-v">${analysis.v2m1}</span></div>
                <div class="prop"><span class="prop-k">ν₂(n+1)</span><span class="prop-v">${analysis.v2p1}</span></div>
                <div class="prop"><span class="prop-k">Trailing 0s</span><span class="prop-v">${trailingZeros(n)}</span></div>
                <div class="prop"><span class="prop-k">Trailing 1s</span><span class="prop-v">${trailingOnes(n)}</span></div>
                <div class="prop"><span class="prop-k">Popcount</span><span class="prop-v">${analysis.popcount} (${(analysis.popcount/analysis.bits*100).toFixed(1)}%)</span></div>
                <h4>Residues mod small primes</h4>
                <div class="residue-grid">
                    ${[3,5,7,11,13,17,19,23].map(q => {
                        const r = n % q;
                        const immune = r !== 0 && (q === 3 || q === 5 || q === 7 || q === 11 || q === 13);
                        return `<div class="residue-item ${immune?'immune':''}"><span class="q">%${q}=</span><span class="r">${r}</span></div>`;
                    }).join('')}
                </div>
            </div>`;
            
            // Panel 3: First Kind Chain Trace
            html += `<div class="analysis-panel">
                <h3>🔴 First Kind Trace (2p+1)</h3>
                ${renderChainTrace(analysis.trace1, 'first')}
            </div>`;
            
            // Panel 4: Second Kind Chain Trace  
            html += `<div class="analysis-panel">
                <h3>🔵 Second Kind Trace (2p−1)</h3>
                ${renderChainTrace(analysis.trace2, 'second')}
            </div>`;
            
            document.getElementById('analysisGrid').innerHTML = html;
            render();
        }
        
        function analyzeNumber(n) {
            const isPrm = isPrime(n);
            const bits = n.toString(2).length;
            const popcount = n.toString(2).split('1').length - 1;
            
            // Factorization for composites
            let factorStr = '';
            if (!isPrm) {
                const factors = factorize(n);
                const grouped = {};
                factors.forEach(f => grouped[f] = (grouped[f] || 0) + 1);
                factorStr = Object.entries(grouped).map(([p, e]) => e > 1 ? `${p}^${e}` : p).join(' × ');
            }
            
            // 2-adic valuations
            const v2m1 = n > 1 ? trailingZeros(n - 1) : 0;
            const v2p1 = trailingZeros(n + 1);
            
            // Chain traces
            const trace1 = traceChain(n, 'first', 12);
            const trace2 = traceChain(n, 'second', 12);
            
            return {
                isPrime: isPrm,
                bits,
                popcount,
                factorStr,
                v2m1,
                v2p1,
                trace1,
                trace2,
                cc1Len: trace1.achievedLen,
                cc2Len: trace2.achievedLen
            };
        }
        
        function traceChain(n, kind, maxLen) {
            const positions = [];
            let cur = n;
            let achievedLen = 0;
            let chainBroken = false;
            
            for (let pos = 0; pos <= maxLen; pos++) {
                const prm = isPrime(cur);
                const bits = cur.toString(2).length;
                
                let marker = '';
                if (!chainBroken && prm) {
                    achievedLen = pos + 1;
                } else if (!chainBroken && !prm) {
                    chainBroken = true;
                    marker = 'BREAK';
                }
                
                // Find smallest factor for composites
                let smallestFactor = null;
                if (!prm) {
                    for (let f = 2; f * f <= cur && f < 1000; f++) {
                        if (cur % f === 0) { smallestFactor = f; break; }
                    }
                }
                
                positions.push({
                    pos,
                    val: cur,
                    bits,
                    prime: prm,
                    marker,
                    smallestFactor,
                    isInput: pos === 0
                });
                
                cur = kind === 'first' ? 2 * cur + 1 : 2 * cur - 1;
                if (cur > Number.MAX_SAFE_INTEGER) break;
            }
            
            return { positions, achievedLen };
        }
        
        function renderChainTrace(trace, kind) {
            const primeCount = trace.positions.filter(p => p.prime).length;
            const total = trace.positions.length;
            
            let html = `<div style="margin-bottom:6px;font-size:11px;">
                <strong style="color:${trace.achievedLen >= 4 ? '#22c55e' : trace.achievedLen >= 2 ? '#fbbf24' : '#ef4444'}">
                    CC${trace.achievedLen}
                </strong>
                <span style="color:#6b7280;margin-left:8px;">${primeCount}/${total} positions prime</span>
            </div>`;
            
            // Survival bar
            html += `<div class="survival-bar">`;
            trace.positions.forEach(p => {
                html += `<div class="${p.prime ? 'prime-seg' : 'comp-seg'}" style="flex:1;"></div>`;
            });
            html += `</div>`;
            
            // Position rows
            html += `<div class="chain-trace" style="max-height:180px;overflow-y:auto;">`;
            trace.positions.forEach(p => {
                const rowClass = p.prime ? 'prime' : 'composite';
                const inputClass = p.isInput ? ' input' : '';
                html += `<div class="trace-row ${rowClass}${inputClass}">
                    <span class="pos">${p.pos}</span>
                    <span class="val" onclick="navigator.clipboard.writeText('${p.val}')" title="Click to copy">${p.val}</span>
                    <span class="bits">${p.bits}b</span>
                    <span class="status ${p.prime ? 'prime' : 'composite'}">
                        ${p.prime ? '✓ PRIME' : `÷${p.smallestFactor || '?'}`}
                        ${p.marker === 'BREAK' ? ' ◀' : ''}
                    </span>
                </div>`;
            });
            html += `</div>`;
            
            return html;
        }

        function switchTab(tab) {
            document.getElementById('tabChains').style.display   = tab === 'chains'   ? '' : 'none';
            document.getElementById('tabPrefixes').style.display = tab === 'prefixes' ? '' : 'none';
            document.getElementById('tabBtnChains').classList.toggle('active',   tab === 'chains');
            document.getElementById('tabBtnPrefixes').classList.toggle('active', tab === 'prefixes');
        }

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowLeft') { e.shiftKey ? jumpLeft() : stepLeft(); e.preventDefault(); }
            else if (e.key === 'ArrowRight') { e.shiftKey ? jumpRight() : stepRight(); e.preventDefault(); }
            else if (e.key === 'c' || e.key === 'C') { prevCC(); e.preventDefault(); }
            else if (e.key === 'v' || e.key === 'V') { nextCC(); e.preventDefault(); }
        });

        document.getElementById('numRows').addEventListener('change', () => { render(); findLongestChains(); });
        document.getElementById('visibleCols').addEventListener('change', render);
        document.getElementById('colOffset').addEventListener('change', () => { colOffset = parseInt(document.getElementById('colOffset').value) || 0; render(); });
        document.getElementById('cellSize').addEventListener('change', render);
        document.getElementById('showMod').addEventListener('change', render);
        document.getElementById('showCC').addEventListener('change', render);
        document.getElementById('showCCPath').addEventListener('change', render);
        document.getElementById('showCCLines').addEventListener('change', render);
        document.getElementById('centerNumber').addEventListener('keypress', (e) => { if (e.key === 'Enter') centerOnNumber(); });

        render();
        findLongestChains();
    </script>
</body>
</html>
